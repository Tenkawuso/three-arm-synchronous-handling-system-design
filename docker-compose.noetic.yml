services:
  noetic:
    build:
      context: ./docker/noetic
      dockerfile: Dockerfile
    container_name: yjg-noetic
    working_dir: /workspace/project/catkin_ws
    tty: true
    stdin_open: true
    command: ["sleep", "infinity"]
    environment:
      - DISPLAY=${DISPLAY:-host.docker.internal:0.0}
      - QT_X11_NO_MITSHM=1
      - LIBGL_ALWAYS_INDIRECT=1
      - ROS_MASTER_URI=http://localhost:11311
      - ROS_HOSTNAME=localhost
    volumes:
      - ./:/workspace/project
